<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Expense Tracker</h1>
            <div class="header-actions">
                <button id="export-csv-btn" class="btn secondary-btn">Export to CSV</button>
                <button id="clear-all-btn" class="btn danger-btn">Clear All Data</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Live Summary -->
        <section class="summary-cards" aria-label="Financial Summary">
            <div class="card">
                <h3>Total Income (Filtered)</h3>
                <p id="total-income" class="amount success">₹0.00</p>
            </div>
            <div class="card">
                <h3>Total Expenses (Filtered)</h3>
                <p id="total-expense" class="amount danger">₹0.00</p>
            </div>
            <div class="card">
                <h3>Current Balance (Overall)</h3>
                <p id="current-balance" class="amount">₹0.00</p>
            </div>
        </section>

        <div class="grid-layout">
            <!-- Form & Chart Column -->
            <div class="left-column">
                <section class="form-section card">
                    <h2 id="form-title">Add Transaction</h2>
                    <form id="transaction-form" novalidate>
                        <input type="hidden" id="edit-id">
                        
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" placeholder="e.g. Groceries">
                            <span class="error-msg" id="title-error" aria-live="polite"></span>
                        </div>

                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" step="0.01" placeholder="0.00">
                            <span class="error-msg" id="amount-error" aria-live="polite"></span>
                        </div>

                        <div class="form-group-row">
                            <div class="form-group">
                                <label for="type">Type</label>
                                <select id="type">
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category">
                                    <option value="Food">Food</option>
                                    <option value="Travel">Travel</option>
                                    <option value="Bills">Bills</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Salary">Salary</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date">
                            <span class="error-msg" id="date-error" aria-live="polite"></span>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn primary-btn" id="submit-btn">Save Transaction</button>
                            <button type="button" class="btn secondary-btn hidden" id="cancel-edit-btn">Cancel</button>
                        </div>
                    </form>
                </section>

                <section class="chart-section card">
                    <h2>Spending Breakdown</h2>
                    <canvas id="expenseChart"></canvas>
                </section>
            </div>

            <!-- Filters & History Column -->
            <div class="right-column">
                <section class="filters-section card">
                    <h2>Filter Transactions</h2>
                    <div class="filters-grid">
                        <input type="text" id="search-filter" placeholder="Search by title...">
                        <select id="type-filter">
                            <option value="all">All Types</option>
                            <option value="income">Income Only</option>
                            <option value="expense">Expense Only</option>
                        </select>
                        <select id="category-filter">
                            <option value="all">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Bills">Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Salary">Salary</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="date-filters">
                            <input type="date" id="date-start-filter" title="Start Date">
                            <span>to</span>
                            <input type="date" id="date-end-filter" title="End Date">
                        </div>
                    </div>
                </section>

                <section class="list-section card">
                    <h2>History</h2>
                    <div id="empty-state" class="empty-state hidden" aria-live="polite">
                        <p>No transactions match your current filters.</p>
                    </div>
                    <ul id="transaction-list" class="transaction-list"></ul>
                </section>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
